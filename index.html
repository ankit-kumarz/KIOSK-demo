<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Self Registration - Kiosk</title> 
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">Self Registration</div>
    <div class="topbar-right">Session Expires in: <span id="timer">1:57</span> <button id="endSession" class="end">End Session</button></div>
  </header>

  <main class="wrap">
    <form id="regForm" class="kiosk-form"> 
      <div class="card">
        <div class="mandatory">Fields marked with an asterisk (<span class="star">*</span>) are mandatory.</div>
        <div class="grid cols-3">
          <div class="col">
            <div class="form-group">
              <label>Title</label>
              <select><option>Select</option><option>Mr</option><option>Ms</option></select>
            </div>
            <div class="form-group">
              <label>Mobile Number *</label>
              <input type="tel" placeholder="0999543798" />
            </div>
            <div class="form-group">
              <label>Address *</label>
              <input type="text" />
            </div>
            <div class="form-group">
              <label>DOB *</label>
              <input type="date" id="dob" />
            </div>
            <div class="form-group">
              <label>Kin Details - Name</label>
              <input type="text" />
            </div>
          </div>

          <div class="col">
            <div class="form-group">
              <label>Patient Name *</label>
              <input type="text" id="firstName" required />
            </div>
            <div class="form-group">
              <label>Email ID</label>
              <input type="email" />
            </div> 
            <div class="form-group">
              <label>State *</label>
              <input type="text" placeholder="Search State..." />
            </div>
            <div class="form-group">
              <label>Age *</label>
              <input type="number" id="age" />
            </div>
            <div class="form-group">
              <label>Relationship</label>
              <select><option>Select Relationship</option></select>
            </div>
          </div>

          <div class="col">
            <div class="form-row">
              <div class="form-group small">
                <label>Last Name *</label>
                <input type="text" id="lastName" required />
              </div>
              <div class="form-group small">
                <label>Gender *</label>
                <select><option>Select</option><option>Male</option><option>Female</option></select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group small">
                <label>Pin Code *</label>
                <input type="text" />
              </div> 
              <div class="form-group small">
                <label>National ID</label>
                <select class="national-select"><option>Select</option><option>Aadhaar</option><option>Passport</option></select>
              </div>
              <div class="form-group small">
                <label>National ID No</label>
                <input class="national-no" type="text" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group small">
                <label>City *</label>
                <input type="text" placeholder="Search City..." />
              </div>
              <div class="form-group small">
                <label>Type</label>
                <select><option>Select</option></select>
              </div>
              <div class="form-group small">
                <label>Marital status *</label>
                <select><option>Select</option><option>Single</option><option>Married</option></select>
              </div>
            </div>

            <div class="form-group">
              <label>Phone No</label>
              <input type="tel" />
            </div>
          </div>
        </div>

        <div class="card-footer">
          <label class="agree"><input type="checkbox" id="agree"> I agree to the Terms and Conditions</label>
          <div class="actions">
            <button type="button" id="readBtn" class="btn green">Click to Read</button>
            <button type="submit" class="btn blue">Save</button>
          </div>
        </div>
      </div>
    </form>

    <div id="tcModal" class="modal">
      <div class="modal-content">
        <h3>Terms and Conditions</h3>
        <p>Placeholder terms. Replace with real content for testing.</p>
        <button id="closeTc" class="btn">Close</button> 
      </div>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
